<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e12;
      color: #fcf8fe;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #a3a6ff22, #6063ee22);
      border: 1px solid #a3a6ff44;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #a3a6ff;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-align: center;
    }
    p {
      font-size: 13px;
      color: #acaab0;
      text-align: center;
      max-width: 300px;
      line-height: 1.7;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      background: linear-gradient(135deg, #a3a6ff, #6063ee);
      color: #000;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn svg {
      width: 16px;
      height: 16px;
      stroke: #000;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .note {
      font-size: 11px;
      color: #48474c;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
  </div>
  <h1>Portfolio Template</h1>
  <p>This is a live hosted portfolio. Click below to open it in a new tab and explore or download the source code.</p>
  <a class="btn" href="https://uivault-portfolio.vercel.app/" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    View Live Portfolio
  </a>
  <span class="note">Opens in a new tab</span>
</body>
</html>
