<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Candy Mandala Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="pill">
    <span>Click/tap: morph • Drag: spin • <b>Bold neon + mixed colors</b></span>
    <span class="kbd">Space = confetti</span>
    <span class="kbd">S = save</span>
  </div>
  <div class="btns">
    <button id="morphBtn">Morph ✨</button>
    <button id="remixBtn">Remix 🎛️</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
