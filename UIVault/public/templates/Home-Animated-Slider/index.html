<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Animated Slider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="slider">
    <div class="slider__header">
      <button class="slider__menu" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <span class="slider__label">CODEPEN '26 — NR.2</span>
    </div>
    <div class="slider__body">
      <div class="slider__left">
        <h2 class="slider__title" aria-live="polite"></h2>
        <div class="slider__footer">
          <div class="slider__info">
            <p class="slider__description">A CODEPEN EXPERIMENT<br>BY NIDAL — FRONTEND<br>DEVELOPER</p>
            <p class="slider__location">CRAFTED WITH GSAP<br>AND CURIOSITY.</p>
          </div>
        </div>
      </div>
      <div class="slider__right">
        <div class="slider__images"></div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
