<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howl's Moving Castle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio src="http://cinemont.com/tutorials/howls/in_the_rain.mp3" autoplay loop></audio>

  <div class="container">
    <img class="background" src="http://cinemont.com/tutorials/howls/background.jpg" alt="" />
    <img class="cloud-bg" src="http://cinemont.com/tutorials/howls/cloud-bg.png" alt="" />
    <img class="cloud-bg2" src="http://cinemont.com/tutorials/howls/cloud-bg.png" alt="" />

    <div class="castle-container">
      <div class="castle">

        <div class="brleg">
          <img class="brfoot" src="http://cinemont.com/tutorials/howls/brfoot.png" alt="" />
          <img class="brbottom" src="http://cinemont.com/tutorials/howls/brbottom.png" alt="" />
        </div>

        <div class="frleg">
          <img class="frfoot" src="http://cinemont.com/tutorials/howls/frfoot.png" alt="" />
          <img class="frbottom" src="http://cinemont.com/tutorials/howls/frbottom.png" alt="" />
        </div>

        <img class="chimney3" src="http://cinemont.com/tutorials/howls/chimney3.png" alt="" />
        <img class="treehouse" src="http://cinemont.com/tutorials/howls/treehouse.png" alt="" />

        <div class="houses-group">
          <img class="point6" src="http://cinemont.com/tutorials/howls/point6.png" alt="" />
          <img class="point5" src="http://cinemont.com/tutorials/howls/point5.png" alt="" />
          <img class="point4" src="http://cinemont.com/tutorials/howls/point4.png" alt="" />
          <img class="houses" src="http://cinemont.com/tutorials/howls/houses.png" alt="" />
        </div>

        <img class="chimney2" src="http://cinemont.com/tutorials/howls/chimney2.png" alt="" />
        <img class="chimney1" src="http://cinemont.com/tutorials/howls/chimney1.png" alt="" />
        <img class="wing" src="http://cinemont.com/tutorials/howls/wing.png" alt="" />

        <div class="mound-group">
          <img class="antenna" src="http://cinemont.com/tutorials/howls/antenna.png" alt="" />
          <img class="point3" src="http://cinemont.com/tutorials/howls/point3.png" alt="" />
          <img class="point2" src="http://cinemont.com/tutorials/howls/point2.png" alt="" />
          <img class="point1" src="http://cinemont.com/tutorials/howls/point1.png" alt="" />
          <img class="mound" src="http://cinemont.com/tutorials/howls/mound.png" alt="" />
        </div>

        <img class="wind" src="http://cinemont.com/tutorials/howls/wind.png" alt="" />
        <img class="cannon" src="http://cinemont.com/tutorials/howls/cannon.png" alt="" />
        <img class="main" src="http://cinemont.com/tutorials/howls/main.png" alt="" />

        <div class="blleg">
          <div class="blbottom-group">
            <img class="blfoot" src="http://cinemont.com/tutorials/howls/flfoot.png" alt="" />
            <img class="blbottom" src="http://cinemont.com/tutorials/howls/flbottom.png" alt="" />
          </div>
          <img class="bltop" src="http://cinemont.com/tutorials/howls/fltop.png" alt="" />
        </div>

        <img class="blcover" src="http://cinemont.com/tutorials/howls/blcover.png" alt="" />
        <img class="knob" src="http://cinemont.com/tutorials/howls/knob.png" alt="" />
        <img class="tele" src="http://cinemont.com/tutorials/howls/tele.png" alt="" />
        <img class="telecover" src="http://cinemont.com/tutorials/howls/telecover.png" alt="" />

        <div class="flleg">
          <div class="flbottom-group">
            <img class="flfoot" src="http://cinemont.com/tutorials/howls/flfoot.png" alt="" />
            <img class="flbottom" src="http://cinemont.com/tutorials/howls/flbottom.png" alt="" />
          </div>
          <img class="fltop" src="http://cinemont.com/tutorials/howls/fltop.png" alt="" />
        </div>

        <img class="flcover" src="http://cinemont.com/tutorials/howls/flcover.png" alt="" />
      </div>
    </div>

    <img class="foreground" src="http://cinemont.com/tutorials/howls/foreground.png" alt="" />

    <div class="clouds">
      <img class="cloud-shadow1" src="http://cinemont.com/tutorials/howls/cloud_shadow-1.png" alt="" />
      <img class="cloud-shadow2" src="http://cinemont.com/tutorials/howls/cloud_shadow-1.png" alt="" />
      <img class="cloud-shadow3" src="http://cinemont.com/tutorials/howls/cloud_shadow-1.png" alt="" />
      <img class="cloud1" src="http://cinemont.com/tutorials/howls/cloud-1.png" alt="" />
      <img class="cloud2" src="http://cinemont.com/tutorials/howls/cloud-1.png" alt="" />
      <img class="cloud3" src="http://cinemont.com/tutorials/howls/cloud-2.png" alt="" />
      <img class="cloud4" src="http://cinemont.com/tutorials/howls/cloud-1.png" alt="" />
      <img class="cloud5" src="http://cinemont.com/tutorials/howls/cloud-2.png" alt="" />
    </div>
  </div>

  <div class="control-toggle">Toggle mouse controls</div>
  <div class="load-gate">Loading...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
""
