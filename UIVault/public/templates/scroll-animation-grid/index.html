<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scroll Animation Grid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="content-wrap">
    <header>
      <h1 class="fluid">Scroll<br/>Motion</h1>
      <h2 class="fluid">Grid Animation with Motion.js</h2>
    </header>

    <main>
      <!-- Sticky scroll section -->
      <section>
        <div class="content">
          <div class="grid">

            <!-- Layer 1: Outer edges -->
            <div class="layer">
              <div><img src="https://images.unsplash.com/photo-1540968221243-29f5d70540bf?w=400" alt="photo 1" /></div>
              <div><img src="https://images.unsplash.com/photo-1596135187959-562c650d98bc?w=400" alt="photo 2" /></div>
              <div><img src="https://images.unsplash.com/photo-1628944682084-831f35256163?w=400" alt="photo 3" /></div>
              <div><img src="https://images.unsplash.com/photo-1590013330451-3946e83e0392?w=400" alt="photo 4" /></div>
              <div><img src="https://images.unsplash.com/photo-1590421959604-741d0eec0a2e?w=400" alt="photo 5" /></div>
              <div><img src="https://images.unsplash.com/photo-1572613000712-eadc57acbecd?w=400" alt="photo 6" /></div>
            </div>

            <!-- Layer 2: Inner columns -->
            <div class="layer">
              <div><img src="https://images.unsplash.com/photo-1570097192570-4b49a6736f9f?w=400" alt="photo 7" /></div>
              <div><img src="https://images.unsplash.com/photo-1620789550663-2b10e0080354?w=400" alt="photo 8" /></div>
              <div><img src="https://images.unsplash.com/photo-1617775623669-20bff4ffaa5c?w=400" alt="photo 9" /></div>
              <div><img src="https://images.unsplash.com/photo-1548600916-dc8492f8e845?w=400" alt="photo 10" /></div>
              <div><img src="https://images.unsplash.com/photo-1573824969595-a76d4365a2e6?w=400" alt="photo 11" /></div>
              <div><img src="https://images.unsplash.com/photo-1633936929709-59991b5fdd72?w=400" alt="photo 12" /></div>
            </div>

            <!-- Layer 3: Center top and bottom -->
            <div class="layer">
              <div><img src="https://images.unsplash.com/photo-1540968221243-29f5d70540bf?w=400" alt="photo 13" /></div>
              <div><img src="https://images.unsplash.com/photo-1596135187959-562c650d98bc?w=400" alt="photo 14" /></div>
            </div>

            <!-- Center scaler image -->
            <div class="scaler">
              <img src="https://images.unsplash.com/photo-1628944682084-831f35256163?w=800" alt="featured" />
            </div>

          </div>
        </div>
      </section>

      <!-- Final section -->
      <section>
        <h2 class="fluid">The Grid<br/>Revealed</h2>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
